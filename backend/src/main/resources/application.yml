spring:
  application:
    name: llmhub
  main:
    # WebFlux(Netty)를 명시적으로 강제한다.
    # 서블릿 스타터가 클래스패스에 섞여 들어오면 Spring Boot는 조용히 MVC로
    # 자동설정하고, 그 순간 S13(리액티브-블로킹 격리)의 전제가 무너진다.
    web-application-type: reactive

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:llmhub}
    username: ${POSTGRES_USER:llmhub}
    password: ${POSTGRES_PASSWORD:changeme}

  jpa:
    # 스키마는 Flyway가 만든다. Hibernate가 손대지 않는다.
    hibernate:
      ddl-auto: none
    open-in-view: false

  ai:
    openai:
      # LiteLLM 게이트웨이의 OpenAI 호환 엔드포인트. 코어는 모델명만 전달하고
      # 라우팅·페일오버는 게이트웨이 책임이다 (S8-1, E7).
      base-url: ${LITELLM_BASE_URL:http://localhost:4000}
      # 스타터가 오디오·이미지 모델까지 자동설정하며 키를 요구한다. 키가 없으면
      # 애플리케이션 컨텍스트가 아예 뜨지 않는다.
      api-key: ${LITELLM_API_KEY:changeme}
      chat:
        options:
          # 게이트웨이의 논리 모델명(docker/litellm/config.yaml 의 model_name)이다.
          # 뒷단이 무엇인지는 코어가 알지 않는다 (E7).
          model: ${CHAT_MODEL:chat}

  security:
    oauth2:
      resourceserver:
        jwt:
          # issuer-uri가 아니라 jwk-set-uri를 쓴다. issuer-uri는 빈 생성 시점에
          # Keycloak으로 네트워크 호출을 하므로, Keycloak 없이는 애플리케이션 컨텍스트가
          # 뜨지 않는다. jwk-set-uri는 첫 검증 때 지연 조회한다.
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/llmhub/protocol/openid-connect/certs}

logging:
  pattern:
    # 격리 스케줄러에서 도는 색인·검색·저장 로그에 추적 ID를 붙인다 (REL-3).
    # Blocking 헬퍼가 요청 컨텍스트의 값을 MDC로 옮긴다. 리액티브 스레드의 로그는
    # MDC가 비어 있으므로 traceId를 인자로 직접 남긴다(ChatService).
    correlation: "[%X{traceId:-}] "

management:
  endpoints:
    web:
      exposure:
        # 헬스 외에는 아무것도 열지 않는다.
        include: health
  endpoint:
    health:
      # 의존 컴포넌트의 상태를 밖으로 흘리지 않는다. UP/DOWN만.
      show-details: never
  # server.port는 여기서 정하지 않는다. 애플리케이션 포트에 헬스를 열면 "모든 API는 인증
  # 필요"(SEC-1)가 깨진다. 운영 compose가 MANAGEMENT_SERVER_PORT로 별도 포트를 지정하고,
  # 그 포트는 호스트에 publish하지 않는다 — 컨테이너 헬스체크만 안에서 접근한다.
  # 설정하지 않으면 액추에이터는 애플리케이션 포트에 남고, 그때는 인증이 요구된다.

llmhub:
  auth:
    # 역할→접근 태그 매핑 (S3, E4). 교체해도 재색인이 필요 없다.
    # 사용자 태그와 문서 태그는 단일 공유 어휘다. 변환 계층을 만들지 않는다.
    role-tags:
      USER:
        - public
      ADMIN:
        - public
        - restricted
    # v0는 실질 정책 없이 자리만 (S10). 리터럴로 박으면 RATE_LIMIT_ENABLED가 죽은 설정이 된다 (R-15).
    rate-limit-enabled: ${RATE_LIMIT_ENABLED:false}
    # JWT 검증. 서명·만료 외에 issuer(다른 realm 거부)·audience(같은 realm 다른 클라이언트 거부)를 본다 (R-16).
    jwt:
      # 토큰의 iss와 같아야 한다 = Keycloak 외부 호스트명. jwk-set-uri(내부 호스트)와 다르다.
      issuer: ${KEYCLOAK_ISSUER:http://localhost:8081/realms/llmhub}
      audience: ${JWT_AUDIENCE:llmhub-backend}
    # BFF만 외부 노출된다 (SEC-1).
    cors-allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:3000}

  idx:
    # 허용목록 방식. 차단목록이면 새 포맷이 조용히 통과한다 (SEC-4).
    allowed-uploads:
      txt: [text/plain]
      pdf: [application/pdf]
      hwp: [application/x-hwp, application/haansofthwp]
      docx: [application/vnd.openxmlformats-officedocument.wordprocessingml.document]
    max-upload-bytes: ${MAX_UPLOAD_BYTES:52428800}
    # 경로는 시스템이 생성한다. 사용자 파일명을 경로에 쓰지 않는다 (SEC-4).
    storage-root: ${FILE_STORAGE_ROOT:./data/documents}
    chunk-size-tokens: ${CHUNK_SIZE_TOKENS:512}
    index-name: ${ES_INDEX_NAME:llmhub-chunks}
    # chunk_text의 BM25 분석기. 언어는 배포 설정이다 (S15, E16, REL-4).
    # 바꾸면 새 인덱스가 필요하다 — 매핑은 인덱스 생성 시 고정된다. 차원 변경과 같은 성질이다.
    analyzer: ${SEARCH_ANALYZER:nori}
    elasticsearch-url: ${ES_URL:http://localhost:9200}
    # 운영에서는 ES 보안이 켜져 있다(SEC-1). 개발 compose는 꺼져 있어 비워 둔다.
    elasticsearch-username: ${ES_USERNAME:}
    elasticsearch-password: ${ES_PASSWORD:}
    # ES가 연결만 받고 응답하지 않으면 무한 대기다 (REL-1). Duration 문법.
    elasticsearch-connect-timeout: ${ES_CONNECT_TIMEOUT:5s}
    elasticsearch-response-timeout: ${ES_RESPONSE_TIMEOUT:30s}

  embedding:
    # 색인과 검색이 반드시 같은 모델·차원을 써야 한다. 다르면 에러 없이 검색 품질만 붕괴한다 (S8-4).
    # 바꾸면 재색인이 필요하고, 차원을 바꾸면 새 인덱스가 필요하다 (E9).
    base-url: ${LITELLM_BASE_URL:http://localhost:4000}
    api-key: ${LITELLM_API_KEY:changeme}
    # 이 값이 모든 조각의 메타데이터에 기록되고, staleDocuments() 가 이것으로 재색인 대상을
    # 판정한다. 그러므로 게이트웨이 뒷단의 **실제 모델을 가리키는 이름**이어야 한다.
    # 뒷단만 바꾸고 이 이름을 그대로 두면 stale 판정이 못 잡아 검색이 조용히 깨진다 (OQ-016).
    model: ${EMBEDDING_MODEL:bge-m3}
    dimensions: ${EMBEDDING_DIM:1024}
    # 게이트웨이가 연결만 받고 응답하지 않으면 무한히 매달린다 (REL-1).
    # 임베딩은 조각 수에 비례해 오래 걸리므로 read는 넉넉해야 한다.
    connect-timeout: ${EMBEDDING_CONNECT_TIMEOUT:5s}
    read-timeout: ${EMBEDDING_READ_TIMEOUT:120s}

  search:
    # 색인과 같은 인덱스를 읽는다. 두 모듈은 코드가 아니라 이 스키마로만 만난다.
    index-name: ${ES_INDEX_NAME:llmhub-chunks}
    top-k: ${SEARCH_TOP_K:5}
    # BM25 점수와 벡터 점수는 스케일이 다르다. 배포마다 튜닝한다 (REL-4).
    bm25-boost: ${SEARCH_BM25_BOOST:1.0}
    vector-boost: ${SEARCH_VECTOR_BOOST:1.0}

  chat:
    # LLM 컨텍스트는 최근 N턴 (S2, PERF-5).
    context-turns: ${CONTEXT_TURNS:5}
    # 턴 수만으로는 컨텍스트 길이가 잡히지 않는다. 긴 메시지 하나면 넘친다 (PERF-5).
    # 이력이 예산을 넘으면 오래된 턴부터 버린다. 근거(sources)는 top-k × 조각 크기로 이미 유계다.
    max-context-tokens: ${MAX_CONTEXT_TOKENS:3000}
    # 지금 질문은 자를 수 없다 — 잘라내면 사용자가 묻지 않은 것을 묻게 된다. 거부한다.
    max-question-chars: ${MAX_QUESTION_CHARS:4000}
    # 토큰 "사이"의 유휴 상한. 전체 응답 상한이 아니므로 긴 답변은 잘리지 않는다 (REL-1).
    stream-idle-timeout: ${CHAT_STREAM_IDLE_TIMEOUT:60s}
    # FULL: 질문·응답 전문 기록. MINIMAL: 전문 없이 추적ID·요청자·근거만 (E5).
    audit-scope: ${AUDIT_SCOPE:FULL}
