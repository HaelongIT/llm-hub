# LiteLLM Gateway — 내부망 전용.
# 모델별 라우팅·페일오버는 게이트웨이 책임이고, 코어는 모델명만 전달한다 (S8-1, E7).
# 코어에 특정 모델을 하드코딩하지 않으므로, 모델 교체는 이 파일과 .env 에서 끝난다.
#
# 아래 model_name 은 .env 의 CHAT_MODEL / EMBEDDING_MODEL 과 일치해야 한다.
# 임베딩 모델을 바꾸면 재색인이 필요하다 (S8-4, E9).

model_list:
  - model_name: placeholder-chat-model
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: placeholder-embedding-model
    litellm_params:
      model: ollama/bge-m3
      api_base: os.environ/OLLAMA_BASE_URL

general_settings:
  master_key: os.environ/LITELLM_API_KEY
